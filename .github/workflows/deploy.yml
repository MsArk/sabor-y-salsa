# Astro static site — do not use jekyll-build-pages; Jekyll parses .astro front matter and fails.
#
# If "pages build and deployment" / jekyll-build-pages still fails on push:
# 1) Repo → Settings → Pages → Build and deployment → Source = "GitHub Actions" (NOT "Deploy from a branch").
# 2) Actions → workflow "pages build and deployment" → … → Disable workflow.
#    That workflow is GitHub-managed (path dynamic/pages/pages-build-deployment) and runs Jekyll on the repo root.
name: Deploy Astro site to Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Las variables PUBLIC_* se resuelven en tiempo de compilación; deben existir aquí,
      # no solo en Pages (el artefacto estático ya lleva los literales sustituidos).
      - name: Build
        env:
          PUBLIC_N8N_RESERVA_WEBHOOK_URL: ${{ secrets.PUBLIC_N8N_RESERVA_WEBHOOK_URL }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
          # v5 excludes dotfiles by default; keep .nojekyll and similar in dist/.
          include-hidden-files: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
